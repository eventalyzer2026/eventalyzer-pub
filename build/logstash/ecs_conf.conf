input {
#   file {
#     path => "/var/log/moodle_access.log"
#     start_position => "beginning"
#     sincedb_path => "/var/lib/logstash/sincedb-moodle_access"
#     mode => "tail"
#     codec => plain { charset => "UTF-8" }
#   }
    beats {
        port => 5044 
    }
}

filter {
  # Сохраняем исходную строку по ECS
  mutate {
    add_field => { "[event][original]" => "%{message}" }
  }

  grok {
    match => {
      "message" => [
        '^%{IPORHOST:[source][ip]} %{DATA:ident} %{DATA:auth} \[%{HTTPDATE:apache_time}\] "%{WORD:[http][request][method]} %{URIPATHPARAM:[url][original]} HTTP/%{NUMBER:[http][version]}" %{NUMBER:[http][response][status_code]:int} (?:%{NUMBER:[http][response][body][bytes]:int}|-) "%{DATA:[http][request][referrer]}" "%{DATA:[user_agent][original]}"$'
      ]
    }
    tag_on_failure => ["_grok_moodle_access_fail"]
  }

  # Время -> @timestamp (месяцы Dec/Nov и т.п. лучше парсить с locale=en)
  date {
    match  => [ "apache_time", "dd/MMM/yyyy:HH:mm:ss Z" ]
    target => "@timestamp"
    locale => "en"
    remove_field => [ "apache_time" ]
  }

  # Разбивка URL: directory -> [url][path], filename -> [url][file]
  # Плюс сохраняем полный путь без query в [url][path_full] (custom, чтобы не потерять)
  ruby {
    code => '
      u = event.get("[url][original]")
      if u
        path, query = u.split("?", 2)
        event.set("[url][query]", query) if query && !query.empty?
        event.set("[url][path_full]", path)

        if path
          # если оканчивается на "/", считаем что файла нет
          if path.end_with?("/")
            dir = path.sub(/\/+$/, "")
            dir = "/" if dir.nil? || dir.empty?
            event.set("[url][path]", dir)
            event.set("[url][file]", "")
          else
            dir = File.dirname(path)
            dir = "/" if dir == "." || dir.nil? || dir.empty?
            file = File.basename(path)
            event.set("[url][path]", dir)
            event.set("[url][file]", file)
          end
        end
      end
    '
  }

  # Полный разбор User-Agent в ECS-структуру
  useragent {
    source => "[user_agent][original]"
    target => "user_agent"
    ecs_compatibility => "v8"
  }

  # Обычно ident/auth всегда "-" — можно выкинуть
  mutate {
    remove_field => [ "ident", "auth", "message" ]
  }
}

output {
  stdout { codec => rubydebug { metadata => false } }

  file { 
    path => "/usr/share/logstash/parsed_logs/access_%{+YYYY.MM.dd}.json"
    codec => json_lines
  }

  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "raw-logs-%{+YYYY.MM.dd}"
  }
}
