input {
    beats {
        port => 5044
    }
}

filter {
    if [message] {
        grok {
            match => { "message" => "%{COMBINEDAPACHELOG}" }
        }
        date {
            match => [ "timestamp", "dd/MMM/YYYY:HH:mm:ss Z" ]
            target => "@timestamp"
        }
        useragent {
            source => "agent"
            target => "user_agent"
        }
        geoip {
            source => "clientip"
            target => "geoip"
        }
  }
}

output {
    elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "raw-logs-%{+YYYY.MM.dd.HH.mm.ss}"
        ilm_enabled => false
        manage_template => false
    }

    # eventalyzer {
    #     hosts => ["http://eventalyzer:8001/classify"]
    # }

    stdout {codec => rubydebug}
}