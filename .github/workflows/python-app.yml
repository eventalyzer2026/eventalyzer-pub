name: Python application

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["dev2", "main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            src/requirements.txt
            build/ml_service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8
          pip install -r src/requirements.txt
          apt install curl -y
          if [ -f build/ml_service/requirements.txt ]; then pip install -r build/ml_service/requirements.txt; fi
      
      - name: Set up infra
        run: |
          docker compose up -f build/docker-compose.yml
          
      - name: Ensure that container has started
        run: |
          docker compose -f build/docker-compose.yml ps
          
      - name: Show environment
        run: |
          python --version
          pip --version
          pip list

      - name: Lint with flake8
        run: |
          flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -v tests
